<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Engine v10.4 - N4 Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { background: #0D0D0D; font-family: 'Plus Jakarta Sans', sans-serif; color: #F2F2F2; }
        .card-dark { background: #171717; border: 1px solid #262626; }
        .accent-v { color: #FF8C00; } /* Orange untuk Vocab */
        .accent-g { color: #A855F7; } /* Purple untuk Grammar */
        .page { display: none; } .page.active { display: flex; }
        .progress-bg { height: 6px; background: #262626; border-radius: 10px; overflow: hidden; }
        .fill-v { height: 100%; background: #FF8C00; transition: width 0.8s ease; }
        .fill-g { height: 100%; background: #A855F7; transition: width 0.8s ease; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="pg-dash" class="page active flex-col p-6 space-y-8 overflow-y-auto">
        <header class="flex justify-between items-center mt-2">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-zinc-900 rounded-xl flex items-center justify-center font-extrabold text-orange-500 border border-zinc-800">N4</div>
                <div>
                    <h1 class="text-sm font-bold">Neural Engine</h1>
                    <p class="text-[10px] opacity-40 uppercase tracking-tighter">Leveling System v10.4</p>
                </div>
            </div>
            <div class="flex space-x-4 text-xs font-bold">
                <span class="accent-v"><i class="fas fa-fire mr-1"></i> 1 DAY</span>
            </div>
        </header>

        <section class="space-y-6 pt-4">
            <h2 class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-30">Learning Progress</h2>
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <div class="flex justify-between text-[11px] mb-2 font-bold uppercase">
                        <span>Vocabulary</span><span id="stat-v-perc" class="accent-v">0%</span>
                    </div>
                    <div class="progress-bg"><div id="stat-v-bar" class="fill-v" style="width: 0%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[11px] mb-2 font-bold uppercase">
                        <span>Grammar</span><span id="stat-g-perc" class="accent-g">0%</span>
                    </div>
                    <div class="progress-bg"><div id="stat-g-bar" class="fill-g" style="width: 0%"></div></div>
                </div>
            </div>
        </section>

        <section class="card-dark p-6 rounded-[2rem] space-y-5 shadow-2xl">
            <h2 class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-30 text-center">Daily Mission</h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between text-sm">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-circle-check accent-v opacity-20"></i>
                        <span class="font-semibold opacity-80">25 Vocabulary</span>
                    </div>
                    <span id="mission-v" class="text-xs font-bold opacity-40">0/25</span>
                </div>
                <div class="flex items-center justify-between text-sm">
                    <div class="flex items-center space-x-3">
                        <i class="fas fa-circle-check accent-g opacity-20"></i>
                        <span class="font-semibold opacity-80">10 Grammar</span>
                    </div>
                    <span id="mission-g" class="text-xs font-bold opacity-40">0/10</span>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-2 gap-4 pb-10">
            <button onclick="Engine.mulaiSesi('vocab')" class="bg-white text-black py-6 rounded-[1.5rem] font-black uppercase text-[11px] tracking-tight hover:scale-[1.02] active:scale-95 transition">
                Start Vocab
            </button>
            <button onclick="Engine.mulaiSesi('grammar')" class="bg-zinc-800 text-white py-6 rounded-[1.5rem] font-black uppercase text-[11px] tracking-tight border border-zinc-700 active:scale-95 transition">
                Start Grammar
            </button>
        </div>
    </div>

    <div id="pg-sesi" class="page flex-col h-full bg-[#0A0A0A]">
        <header class="p-6 flex justify-between items-center">
            <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center opacity-40 text-xl"><i class="fas fa-chevron-left"></i></button>
            <span id="session-title" class="text-[10px] font-bold opacity-30 uppercase tracking-[0.3em]">Learning</span>
            <div class="w-10"></div>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center p-6 pb-20">
            <div id="kartu" onclick="Engine.tampilkan()" class="w-full max-w-sm aspect-[3/4] card-dark rounded-[3.5rem] flex flex-col items-center justify-center text-center cursor-pointer p-10 relative transition-all duration-500 active:scale-95">
                <div id="type-badge" class="absolute top-12 px-5 py-1.5 rounded-full text-[9px] font-black border uppercase tracking-widest">TYPE</div>
                
                <h2 id="q-kanji" class="text-6xl font-black mb-8 tracking-tighter text-white"></h2>
                
                <p id="tap-hint" class="text-[10px] uppercase tracking-[0.4em] opacity-20 font-bold animate-pulse">Tap to reveal</p>
                
                <div id="box-ans" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <p id="q-baca" class="text-2xl font-bold italic"></p>
                    <div class="h-px bg-zinc-800 w-16 mx-auto"></div>
                    <h3 id="q-arti" class="text-4xl font-black"></h3>
                </div>
            </div>
            <p id="progress-text" class="mt-8 text-[11px] font-bold opacity-20 tracking-widest uppercase italic">Node 1 / 5</p>
        </main>

        <footer id="btn-eval" class="hidden p-8 grid grid-cols-2 gap-4 pb-14 bg-gradient-to-t from-black to-transparent">
            <button onclick="Engine.eval(false)" class="py-5 bg-zinc-900/50 rounded-2xl font-bold text-xs uppercase text-red-500 border border-red-950/30">Lupa</button>
            <button onclick="Engine.eval(true)" class="py-5 bg-white text-black rounded-2xl font-black text-xs uppercase shadow-[0_0_30px_rgba(255,255,255,0.1)]">Ingat</button>
        </footer>
    </div>

    <script src="data_n4.js"></script>

    <script>
        const Engine = {
            nodes: (() => {
                const saved = JSON.parse(localStorage.getItem('neural_v104'));
                // Merging data eksternal dengan progres lokal
                return saved ? { ...N4_DATASET, ...saved } : N4_DATASET;
            })(),
            queue: [], idx: 0,

            init() { 
                this.updateUI(); 
            },

            mulaiSesi(type) {
                const all = Object.values(this.nodes);
                const limit = (type === 'vocab') ? 25 : 10;
                
                // Filter berdasarkan type
                this.queue = all.filter(n => {
                    const isCorrectType = (type === 'grammar') ? n.type === 'grammar' : n.type !== 'grammar';
                    return isCorrectType && n.state === 'new';
                }).slice(0, limit);

                if(!this.queue.length) return alert(`Misi ${type} baru sudah habis. Silakan review data lama atau tambah data di data_n4.js`);
                
                this.idx = 0;
                document.getElementById('session-title').innerText = `${type} Session`;
                this.showPage('pg-sesi');
                this.render();
            },

            render() {
                const node = this.queue[this.idx];
                const badge = document.getElementById('type-badge');
                
                document.getElementById('q-kanji').innerText = node.kanji;
                document.getElementById('tap-hint').classList.remove('hidden');
                document.getElementById('box-ans').classList.add('hidden');
                document.getElementById('btn-eval').classList.add('hidden');
                document.getElementById('progress-text').innerText = `${this.idx + 1} / ${this.queue.length}`;
                
                // UI Badge Logic
                const isG = node.type === 'grammar';
                badge.innerText = isG ? 'Grammar' : 'Vocab';
                badge.className = isG ? 
                    "absolute top-12 px-5 py-1.5 rounded-full text-[9px] font-black border-purple-500/50 text-purple-500 border uppercase" : 
                    "absolute top-12 px-5 py-1.5 rounded-full text-[9px] font-black border-orange-500/50 text-orange-500 border uppercase";
            },

            tampilkan() {
                const node = this.queue[this.idx];
                const bacaElem = document.getElementById('q-baca');
                
                document.getElementById('tap-hint').classList.add('hidden');
                document.getElementById('box-ans').classList.remove('hidden');
                document.getElementById('btn-eval').classList.remove('hidden');
                
                bacaElem.innerText = node.baca;
                bacaElem.className = `text-2xl font-bold italic ${node.type === 'grammar' ? 'accent-g' : 'accent-v'}`;
                document.getElementById('q-arti').innerText = node.arti;

                // Voice TTS
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(node.baca);
                msg.lang = 'ja-JP';
                msg.rate = 0.8;
                window.speechSynthesis.speak(msg);
            },

            eval(sukses) {
                const node = this.queue[this.idx];
                node.state = 'review';
                node.last = new Date().toISOString();
                node.s = sukses ? 5 : 1; // Spacing sederhana
                this.save();
                
                if (this.idx < this.queue.length - 1) {
                    this.idx++;
                    this.render();
                } else {
                    location.reload(); // Selesai sesi, kembali ke dashboard
                }
            },

            updateUI() {
                const all = Object.values(this.nodes);
                const vocab = all.filter(n => n.type !== 'grammar');
                const grammar = all.filter(n => n.type === 'grammar');

                // Hitung Progress Bar
                const vM = (vocab.filter(n => n.state === 'review').length / (vocab.length || 1)) * 100;
                const gM = (grammar.filter(n => n.state === 'review').length / (grammar.length || 1)) * 100;

                document.getElementById('stat-v-perc').innerText = Math.round(vM) + "%";
                document.getElementById('stat-v-bar').style.width = vM + "%";
                document.getElementById('stat-g-perc').innerText = Math.round(gM) + "%";
                document.getElementById('stat-g-bar').style.width = gM + "%";

                // Hitung Misi Harian (Yang dipelajari hari ini)
                const today = new Date().toLocaleDateString();
                const doneV = vocab.filter(n => n.last && new Date(n.last).toLocaleDateString() === today).length;
                const doneG = grammar.filter(n => n.last && new Date(n.last).toLocaleDateString() === today).length;

                document.getElementById('mission-v').innerText = `${doneV}/25`;
                document.getElementById('mission-g').innerText = `${doneG}/10`;
            },

            save() { localStorage.setItem('neural_v104', JSON.stringify(this.nodes)); },
            showPage(id) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            }
        };

        window.onload = () => Engine.init();
    </script>
</body>
</html>
