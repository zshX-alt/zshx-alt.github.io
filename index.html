<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="progress-container" style="width: 100%; height: 4px; background: #161b22; position: fixed; top: 0; left: 0; z-index: 100;">
        <div id="progress-bar" style="width: 0%; height: 100%; background: var(--accent); transition: 0.3s;"></div>
    </div>
    <div id="app-container">
        <nav style="margin: 10px 0 20px 0;"><a href="index.html" style="color: var(--accent); text-decoration: none; font-weight: bold;">← MENU</a></nav>
        <header>
            <h1 id="bab-title">Loading...</h1>
            <p id="bab-desc" class="subtitle"></p>
        </header>
        <main id="content"></main>
        <footer style="margin: 40px 0; display: flex; gap: 10px;">
            <button id="prev-btn" class="nav-btn" style="background:var(--card); color:var(--text); border:1px solid var(--border); display:none;">← Prev</button>
            <button id="next-btn" class="nav-btn" style="flex-grow: 1;">Bab Selanjutnya →</button>
        </footer>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
