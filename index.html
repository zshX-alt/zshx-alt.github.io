<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N4 - Master Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>JLPT N4 Study</h1>
            <div class="stats-container">
                <div class="stat-box">
                    <span id="progress-percent">0%</span>
                    <small>Total Progres</small>
                </div>
                <div class="stat-box">
                    <span id="vocab-count">0 / 1500</span>
                    <small>Kosakata</small>
                </div>
            </div>
            <div class="progress-bar"><div id="main-progress" class="fill"></div></div>
        </header>

        <nav class="mode-selector">
            <button onclick="changeMode('vocab')" id="mode-vocab" class="active">Kosakata</button>
            <button onclick="changeMode('grammar')" id="mode-grammar">Tata Bahasa</button>
        </nav>

        <div id="grammar-menu" style="display:none;">
            <div class="bab-container" id="bab-list">
                </div>
            <p class="bab-label">Topik: <span id="current-bab-name">Pilih Bab</span></p>
        </div>

        <main id="flashcard-area">
            <div class="card-stack">
                <div id="main-card" class="flashcard">
                    <div class="card-front">
                        <h2 id="card-kanji">...</h2>
                        <p class="tap-hint">Klik untuk lihat arti</p>
                    </div>
                    <div class="card-back" id="card-content-back">
                        </div>
                </div>
            </div>

            <div class="flashcard-controls">
                <button class="btn-action dont-know" onclick="handleAnswer(false)">❌ Belum</button>
                <button class="btn-action know" onclick="handleAnswer(true)">✅ Tahu</button>
            </div>
        </main>

        <footer>
            <button class="btn-reset" onclick="resetProgress()">Reset Semua Progres</button>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
