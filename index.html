<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N4 Master</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --accent: #2c2c2e;
            --text: #ffffff;
            --dim: #8e8e93;
            --success: #30d158;
            --error: #ff453a;
            --blue: #0a84ff;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif; margin: 0; 
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            padding: 18px; text-align: center; border-bottom: 0.5px solid var(--accent);
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            font-size: 13px; font-weight: 700; letter-spacing: 2px;
        }

        .container { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 150px; }

        /* Flashcard Area */
        .card-zone { height: 50vh; perspective: 1200px; margin: 20px 0; z-index: 1; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 30px; background: var(--card-bg);
            border: 1px solid var(--accent);
        }
        .card-back { transform: rotateY(180deg); background: #252528; }

        .kanji { font-size: 72px; margin: 0; font-weight: 600; }
        .reading { font-size: 22px; color: var(--dim); margin-bottom: 8px; }
        .meaning { font-size: 30px; font-weight: 700; color: var(--success); text-align: center; }

        /* Controls - Fixed at top layer */
        .controls {
            position: fixed; bottom: 85px; left: 0; width: 100%;
            display: none; padding: 0 20px; gap: 15px; z-index: 9999;
        }
        .controls.visible { display: flex; animation: slideUp 0.3s ease; }

        .btn {
            flex: 1; padding: 18px; border-radius: 14px; border: none;
            font-size: 14px; font-weight: 700; text-transform: uppercase;
        }
        .btn-again { background: #262626; color: var(--error); border: 1px solid var(--error); }
        .btn-good { background: var(--success); color: #000; }

        /* Bottom Nav - Text Only */
        nav {
            position: fixed; bottom: 0; width: 100%; background: #1c1c1e;
            display: flex; border-top: 0.5px solid var(--accent);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { 
            flex: 1; text-align: center; padding: 22px 0; 
            color: var(--dim); font-size: 11px; font-weight: 700; letter-spacing: 1px;
        }
        .nav-item.active { color: var(--text); border-top: 2px solid var(--blue); }

        .grammar-box { background: var(--card-bg); padding: 18px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--blue); }
        .hidden { display: none; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<header id="h-title">VOCABULARY</header>

<div class="container">
    <div id="sec-vocab">
        <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); font-weight: bold;">
            <span id="label-day">DAY 1</span>
            <span id="label-count">0 / 0</span>
        </div>
        <div class="card-zone">
            <div class="card-inner" id="card" onclick="flipCard()">
                <div class="card-face">
                    <h1 class="kanji" id="v-kanji">---</h1>
                    <p style="color: var(--dim); font-size: 10px; margin-top: 40px; letter-spacing: 1px;">TAP TO FLIP</p>
                </div>
                <div class="card-face card-back">
                    <div class="reading" id="v-reading">---</div>
                    <div class="meaning" id="v-meaning">---</div>
                </div>
            </div>
        </div>
    </div>

    <div id="sec-grammar" class="hidden">
        <div id="grammar-list"></div>
    </div>

    <div id="sec-stats" class="hidden">
        <div class="grammar-box">
            <p style="font-size: 11px; color: var(--dim); margin: 0 0 10px;">MASTERY PROGRESS</p>
            <div style="background: var(--accent); height: 8px; border-radius: 4px; overflow: hidden;">
                <div id="p-bar" style="background: var(--success); height: 100%; width: 0%; transition: 0.8s;"></div>
            </div>
            <p id="p-text" style="margin-top: 12px; font-weight: 700; font-size: 14px;">0 / 1500 WORDS</p>
        </div>
    </div>
</div>

<div class="controls" id="card-controls">
    <button class="btn btn-again" onclick="handleResult(false)">ULANGI</button>
    <button class="btn btn-good" onclick="handleResult(true)">HAFAI</button>
</div>

<nav>
    <div class="nav-item active" id="n-vocab" onclick="switchTab('vocab')">VOCAB</div>
    <div class="nav-item" id="n-grammar" onclick="switchTab('grammar')">GRAMMAR</div>
    <div class="nav-item" id="n-stats" onclick="switchTab('stats')">STATS</div>
</nav>

<script src="data_vocab.js"></script>
<script src="data_grammar.js"></script>
<script src="script.js"></script>
</body>
</html>
