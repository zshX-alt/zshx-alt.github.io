<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nihongo Master Pro - Firman</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="kosakata.js"></script>
    <script src="bunpo.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { background-color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; color: #e5e5e5; }
        .glass-card { background: #262626; border: 1px solid #404040; }
        .page { display: none; }
        .page.active { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Flashcard Animation */
        .perspective { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; position: relative; width: 100%; height: 420px; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 2.5rem; background: #262626; border: 2px solid #404040; }
        .card-back { transform: rotateY(180deg); border-color: #a3a3a3; }
    </style>
</head>
<body class="pb-28">

    <div id="pg-dash" class="page active">
        <header class="p-5 flex items-center justify-between border-b border-[#404040] sticky top-0 bg-[#1a1a1a]/90 backdrop-blur-md z-50">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-[#404040] rounded-lg flex items-center justify-center font-black italic">N</div>
                <span class="text-xs font-bold text-[#a3a3a3]">Level N4</span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-1 text-orange-500">
                    <i class="fas fa-fire text-xs"></i>
                    <span class="text-[10px] font-black uppercase">12 DAY</span>
                </div>
                <div class="text-blue-400 flex items-center space-x-1">
                    <i class="fas fa-bolt text-[10px]"></i>
                    <span id="display-xp" class="text-[10px] font-black uppercase">XP 0</span>
                </div>
            </div>
        </header>

        <main class="p-6 space-y-8">
            <section class="space-y-4">
                <h3 class="text-[10px] font-black text-[#737373] uppercase tracking-widest">Progress JLPT</h3>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-[10px] font-bold mb-1"><span>Vocabulary</span><span id="vocab-pct">0%</span></div>
                        <div class="h-1.5 w-full bg-[#404040] rounded-full overflow-hidden"><div id="vocab-bar" class="h-full bg-blue-500 transition-all duration-700" style="width: 0%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] font-bold mb-1"><span>Grammar</span><span id="gram-pct">0%</span></div>
                        <div class="h-1.5 w-full bg-[#404040] rounded-full overflow-hidden"><div id="gram-bar" class="h-full bg-emerald-500 transition-all duration-700" style="width: 0%"></div></div>
                    </div>
                </div>
                <button onclick="startLesson()" class="w-full py-4 bg-[#f5f5f5] text-[#1a1a1a] rounded-2xl text-[10px] font-black tracking-widest shadow-xl active:scale-95 transition">
                    CONTINUE LEARNING
                </button>
            </section>

            <section class="glass-card rounded-[2rem] p-6 space-y-4">
                <h3 class="text-[10px] font-black text-[#a3a3a3] uppercase tracking-widest">Daily Mission</h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-3 text-xs font-bold">
                            <i id="check-gram" class="far fa-circle text-[#737373]"></i>
                            <span>10 Grammar</span>
                        </div>
                        <span id="count-gram" class="text-[10px] font-black text-[#737373]">0/10</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-3 text-xs font-bold">
                            <i id="check-vocab" class="far fa-circle text-[#737373]"></i>
                            <span>25 Vocabulary</span>
                        </div>
                        <span id="count-vocab" class="text-[10px] font-black text-[#737373]">0/25</span>
                    </div>
                </div>
            </section>

            <section class="grid grid-cols-3 gap-3">
                <button class="glass-card p-4 rounded-2xl flex flex-col items-center space-y-2"><i class="fas fa-feather-alt text-emerald-400"></i><span class="text-[9px] font-bold">GRAMMAR</span></button>
                <button class="glass-card p-4 rounded-2xl flex flex-col items-center space-y-2"><i class="fas fa-book text-blue-400"></i><span class="text-[9px] font-bold">VOCAB</span></button>
                <button onclick="startReview()" class="glass-card p-4 rounded-2xl flex flex-col items-center space-y-2"><i class="fas fa-clone text-indigo-400"></i><span class="text-[9px] font-bold">CARDS</span></button>
            </section>

            <section class="glass-card rounded-[2rem] p-6 border-l-4 border-indigo-500">
                <h3 class="text-sm font-extrabold mb-1">Review Today</h3>
                <p id="review-stats" class="text-[10px] text-[#737373] font-bold mb-4 uppercase tracking-tighter">Vocab: 0 • Due Now</p>
                <button onclick="startReview()" class="w-full py-3 bg-[#404040] text-[#f5f5f5] rounded-xl text-[10px] font-black active:scale-95 transition">START REVIEW</button>
            </section>

            <section class="space-y-4">
                <h3 class="text-[10px] font-black text-[#737373] uppercase tracking-widest px-1">Achievements</h3>
                <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar">
                    <div class="flex-shrink-0 w-24 h-24 glass-card rounded-2xl flex flex-col items-center justify-center p-2">
                        <i class="fas fa-medal text-amber-500 text-xl mb-2"></i><p class="text-[8px] font-black uppercase text-center">First Lesson</p>
                    </div>
                    <div class="flex-shrink-0 w-24 h-24 glass-card rounded-2xl flex flex-col items-center justify-center p-2">
                        <i class="fas fa-calendar-check text-orange-500 text-xl mb-2"></i><p class="text-[8px] font-black uppercase text-center">7 Day Streak</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="pg-learning" class="page p-6 min-h-screen">
        <header class="flex justify-between items-center mb-10">
            <button onclick="showPage('pg-dash')"><i class="fas fa-times text-xl text-[#737373]"></i></button>
            <span id="learning-title" class="text-[10px] font-black uppercase tracking-widest text-indigo-400 tracking-[0.2em]">SESSION</span>
            <div class="w-6"></div>
        </header>

        <div class="perspective w-full max-w-sm mx-auto">
            <div id="flash-card-inner" class="card-inner" onclick="this.classList.toggle('is-flipped')">
                <div class="card-front">
                    <h2 id="f-kanji" class="text-7xl font-bold mb-4 text-white"></h2>
                    <p class="text-[#737373] text-[10px] uppercase tracking-widest animate-pulse">Tap to Reveal</p>
                </div>
                <div class="card-back p-8 text-center">
                    <p id="f-reading" class="text-indigo-400 font-bold text-2xl mb-2 uppercase"></p>
                    <h2 id="f-meaning" class="text-3xl font-extrabold mb-12"></h2>
                    <div class="grid grid-cols-2 gap-4 w-full px-4">
                        <button onclick="handleAnswer('hard', event)" class="py-4 bg-red-500/10 text-red-500 rounded-2xl text-[10px] font-black border border-red-500/20 active:scale-95 transition">HARD</button>
                        <button onclick="handleAnswer('easy', event)" class="py-4 bg-emerald-500/10 text-emerald-500 rounded-2xl text-[10px] font-black border border-emerald-500/20 active:scale-95 transition">EASY</button>
                    </div>
                </div>
            </div>
        </div>
        <p id="card-counter" class="mt-8 text-center text-[#737373] text-[10px] font-bold uppercase tracking-widest"></p>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 px-10 py-5 flex justify-between items-center bg-[#1a1a1a] border-t border-[#404040] z-40">
        <button onclick="showPage('pg-dash')"><i class="fas fa-home text-lg"></i></button>
        <button onclick="startReview()"><i class="fas fa-clone text-[#737373] text-lg"></i></button>
        <button onclick="startLesson()" class="w-14 h-14 bg-[#f5f5f5] rounded-full flex items-center justify-center -mt-12 shadow-2xl border-4 border-[#1a1a1a] active:scale-90 transition">
            <i class="fas fa-bolt text-[#1a1a1a] text-xl"></i>
        </button>
        <button><i class="fas fa-headphones text-[#737373] text-lg"></i></button>
        <button><i class="fas fa-user text-[#737373] text-lg"></i></button>
    </nav>

    <script>
        let xp = parseInt(localStorage.getItem('firman_xp')) || 0;
        let dVocab = parseInt(localStorage.getItem('firman_d_vocab')) || 0;
        let dGram = parseInt(localStorage.getItem('firman_d_gram')) || 0;
        let queue = [];
        let qIdx = 0;

        function updateUI() {
            // Global Progress
            const mVocab = n4Vocab.filter(v => v.status === 'learned').length;
            const vPct = Math.floor((mVocab / n4Vocab.length) * 100);
            document.getElementById('vocab-pct').innerText = vPct + "%";
            document.getElementById('vocab-bar').style.width = vPct + "%";

            const mGram = n4Bunpo.filter(b => b.status === 'learned').length;
            const gPct = Math.floor((mGram / n4Bunpo.length) * 100);
            document.getElementById('gram-pct').innerText = gPct + "%";
            document.getElementById('gram-bar').style.width = gPct + "%";

            // XP & Daily Mission
            document.getElementById('display-xp').innerText = `XP ${xp}`;
            document.getElementById('count-gram').innerText = `${dGram}/10`;
            document.getElementById('count-vocab').innerText = `${dVocab}/25`;

            if(dGram >= 10) document.getElementById('check-gram').className = "fas fa-check-circle text-emerald-500";
            if(dVocab >= 25) document.getElementById('check-vocab').className = "fas fa-check-circle text-emerald-500";

            // Review Stats
            const today = new Date().toISOString().split('T')[0];
            const revs = n4Vocab.filter(v => v.status === 'learned' && v.nextReview <= today).length;
            document.getElementById('review-stats').innerText = `Vocab: ${revs} • Due Now`;
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startLesson() {
            queue = n4Vocab.filter(v => v.status === 'new').slice(0, 5);
            if(queue.length === 0) return alert("Materi baru habis!");
            document.getElementById('learning-title').innerText = "NEW LESSON";
            qIdx = 0; showPage('pg-learning'); renderFlashcard();
        }

        function startReview() {
            const today = new Date().toISOString().split('T')[0];
            queue = n4Vocab.filter(v => v.status === 'learned' && v.nextReview <= today);
            if(queue.length === 0) return alert("Belum ada jadwal review.");
            document.getElementById('learning-title').innerText = "DAILY REVIEW";
            qIdx = 0; showPage('pg-learning'); renderFlashcard();
        }

        function renderFlashcard() {
            const item = queue[qIdx];
            document.getElementById('flash-card-inner').classList.remove('is-flipped');
            document.getElementById('f-kanji').innerText = item.kanji;
            document.getElementById('f-reading').innerText = item.reading;
            document.getElementById('f-meaning').innerText = item.meaning;
            document.getElementById('card-counter').innerText = `${qIdx + 1} / ${queue.length}`;
        }

        function handleAnswer(type, e) {
            e.stopPropagation();
            const item = queue[qIdx];
            
            xp += (type === 'easy' ? 20 : 10);
            localStorage.setItem('firman_xp', xp);

            // Jika sesi review atau lesson baru, tetap tambah hit harian
            dVocab++;
            localStorage.setItem('firman_d_vocab', dVocab);

            const dataIdx = n4Vocab.findIndex(v => v.id === item.id);
            n4Vocab[dataIdx].status = 'learned';
            
            let next = new Date();
            next.setDate(next.getDate() + (type === 'easy' ? 4 : 1));
            n4Vocab[dataIdx].nextReview = next.toISOString().split('T')[0];

            if(qIdx < queue.length - 1) {
                qIdx++; renderFlashcard();
            } else {
                alert("Sesi Selesai!");
                showPage('pg-dash'); updateUI();
            }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
