<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N4 Master Mobile</title>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-card: #1d1d1f;
            --accent: #2c2c2e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --success: #32d74b;
            --highlight: #0a84ff;
            --warning: #ffd60a;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; background-color: var(--bg-dark); color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Header */
        header {
            padding: 15px; text-align: center; border-bottom: 1px solid var(--accent);
            background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(10px);
        }

        .container { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

        /* Flashcard Mobile */
        .vocab-card-container { height: 60vh; perspective: 1000px; position: relative; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 20px; border: 1px solid var(--accent);
            background: var(--bg-card); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card-back { transform: rotateY(180deg); }

        .kanji-text { font-size: 80px; margin: 0; font-weight: 600; }
        .reading-text { font-size: 24px; color: var(--text-dim); margin-bottom: 10px; }
        .meaning-text { font-size: 34px; font-weight: bold; color: var(--success); }

        /* Mobile Controls */
        .controls {
            position: fixed; bottom: 85px; left: 0; width: 100%;
            display: none; padding: 0 20px; gap: 15px; z-index: 10;
        }
        .controls.visible { display: flex; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .btn {
            flex: 1; padding: 18px; border-radius: 15px; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-again { background: var(--accent); color: var(--text-main); }
        .btn-good { background: var(--success); color: #000; }

        /* Bottom Nav */
        nav {
            position: fixed; bottom: 0; width: 100%; background: #1c1c1e;
            display: flex; justify-content: space-around; padding: 10px 0 25px 0;
            border-top: 1px solid var(--accent);
        }
        .nav-item { color: var(--text-dim); text-align: center; flex: 1; font-size: 10px; text-transform: uppercase; }
        .nav-item.active { color: var(--highlight); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }

        /* Grammar List */
        .search-box {
            width: 100%; padding: 12px; background: var(--bg-card);
            border: 1px solid var(--accent); border-radius: 10px;
            color: white; margin-bottom: 20px;
        }
        .grammar-card {
            background: var(--bg-card); padding: 15px; border-radius: 12px;
            margin-bottom: 12px; border-left: 4px solid var(--highlight);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<header id="header-title">Vocabulary</header>

<div class="container">
    <div id="sec-vocab">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 12px; color: var(--text-dim);">
            <span id="label-day">DAY 1</span>
            <span id="label-count">0 / 25</span>
        </div>
        <div class="vocab-card-container">
            <div class="card-inner" id="card" onclick="flip()">
                <div class="card-face card-front">
                    <span style="font-size: 10px; color: var(--highlight); position: absolute; top: 20px;">JLPT N4</span>
                    <h1 class="kanji-text" id="d-kanji">...</h1>
                    <p style="margin-top: 40px; color: var(--text-dim); font-size: 12px;">Tap to flip</p>
                </div>
                <div class="card-face card-back">
                    <p class="reading-text" id="d-reading">...</p>
                    <h2 class="meaning-text" id="d-meaning">...</h2>
                </div>
            </div>
        </div>
    </div>

    <div id="sec-grammar" class="hidden">
        <input type="text" class="search-box" id="grammarSearch" placeholder="Cari tata bahasa..." oninput="searchGrammar()">
        <div id="grammar-list"></div>
    </div>

    <div id="sec-progress" class="hidden">
        <div class="grammar-card" style="border-left-color: var(--success);">
            <h3 id="motivational-quote" style="margin: 0; font-weight: 400; font-style: italic; font-size: 14px;">"Benkyou wa mirai no kagi da."</h3>
        </div>
        <div style="margin-top: 30px;">
            <p style="font-size: 12px; color: var(--text-dim);">MASTERY PROGRESS</p>
            <div style="background: var(--accent); height: 10px; border-radius: 5px; overflow: hidden;">
                <div id="bar-v" style="height: 100%; background: var(--success); width: 0%; transition: 1s;"></div>
            </div>
            <p id="stat-v" style="font-size: 14px; margin-top: 8px;">0 / 1500 Kata</p>
        </div>
    </div>
</div>

<div class="controls" id="card-controls">
    <button class="btn btn-again" onclick="handleResult(false)">AGAIN</button>
    <button class="btn btn-good" onclick="handleResult(true)">GOOD</button>
</div>

<nav>
    <div class="nav-item active" id="n-vocab" onclick="switchPage('vocab')">
        <span class="nav-icon">🗂️</span>Vocab
    </div>
    <div class="nav-item" id="n-grammar" onclick="switchPage('grammar')">
        <span class="nav-icon">📖</span>Grammar
    </div>
    <div class="nav-item" id="n-progress" onclick="switchPage('progress')">
        <span class="nav-icon">📈</span>Stats
    </div>
</nav>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
