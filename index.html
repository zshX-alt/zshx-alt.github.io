<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4 Master - Dark App</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --accent: #333333;
            --text-main: #ffffff;
            --text-dim: #888888;
            --success: #2ecc71;
            --highlight: #3498db;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-bottom: 90px;
        }

        header {
            text-align: center;
            padding: 25px 0;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--accent);
            background: var(--bg-dark);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Flashcard Logic UI */
        .vocab-container { height: 400px; perspective: 1000px; margin-top: 20px; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: var(--bg-card); border: 1px solid var(--accent);
            border-radius: 12px; padding: 30px; text-align: center;
        }
        .card-back { transform: rotateY(180deg); }

        .kanji-text { font-size: 72px; font-weight: 500; margin: 0; }
        .reading-text { font-size: 24px; color: var(--text-dim); margin-bottom: 8px; }
        .meaning-text { font-size: 32px; font-weight: bold; }

        /* Controls */
        .controls { display: none; margin-top: 30px; gap: 15px; }
        .controls.visible { display: flex; }
        .btn {
            flex: 1; padding: 16px; border: 1px solid var(--accent);
            background: transparent; color: var(--text-main);
            border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .btn-success { border-color: var(--success); color: var(--success); }

        /* Nav & Others */
        nav {
            position: fixed; bottom: 0; width: 100%; background: #000;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid var(--accent);
        }
        .nav-item { color: var(--text-dim); font-size: 10px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; }
        .nav-item.active { color: var(--text-main); font-weight: bold; }
        .hidden { display: none; }

        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--accent); margin-bottom: 15px; }
        .progress-bar-bg { background: var(--accent); height: 6px; border-radius: 3px; margin: 12px 0; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; transition: width 0.8s ease-out; }
        .grammar-item { background: var(--bg-card); padding: 18px; border-radius: 8px; border-left: 4px solid var(--highlight); margin-bottom: 12px; }
    </style>
</head>
<body>

<header id="page-title">Kosakata</header>

<div class="container">
    <div id="section-vocab">
        <div style="text-align: center; color: var(--text-dim); font-size: 12px; margin-bottom: 15px;">
            HARI <span id="val-day">1</span> &nbsp; | &nbsp; <span id="val-counter">0 / 25</span> KATA
        </div>
        <div class="vocab-container">
            <div class="card-inner" id="flashcard" onclick="flip()">
                <div class="card-face card-front">
                    <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 20px;">TAP UNTUK LIHAT ARTI</p>
                    <h1 class="kanji-text" id="disp-kanji">...</h1>
                </div>
                <div class="card-face card-back">
                    <div class="reading-text" id="disp-reading">...</div>
                    <div class="meaning-text" id="disp-meaning">...</div>
                </div>
            </div>
        </div>
        <div class="controls" id="vocab-controls">
            <button class="btn" onclick="submitResult(false)">ULANGI</button>
            <button class="btn btn-success" onclick="submitResult(true)">HAFAL</button>
        </div>
    </div>

    <div id="section-grammar" class="hidden">
        <div id="grammar-list"></div>
    </div>

    <div id="section-progress" class="hidden">
        <div class="stat-card">
            <label style="font-size: 11px;">PENGUASAAN KATA (1500)</label>
            <div class="progress-bar-bg"><div id="bar-vocab" class="progress-bar-fill" style="background: var(--success);"></div></div>
            <span id="txt-vocab-count" style="font-size: 13px; color: var(--text-dim);">0 / 1500</span>
        </div>
        <div class="stat-card">
            <label style="font-size: 11px;">TARGET 5 BULAN</label>
            <div class="progress-bar-bg"><div id="bar-time" class="progress-bar-fill" style="background: var(--highlight);"></div></div>
            <span id="txt-time-count" style="font-size: 13px; color: var(--text-dim);">150 HARI TERSISA</span>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" id="n-vocab" onclick="navTo('vocab')">Vocab</div>
    <div class="nav-item" id="n-grammar" onclick="navTo('grammar')">Grammar</div>
    <div class="nav-item" id="n-progress" onclick="navTo('progress')">Progress</div>
</nav>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
