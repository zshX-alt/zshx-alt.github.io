<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihongo Pro - 50 Bab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header>
            <h1>Nihongo Pro</h1>
            <p class="subtitle">Minna no Nihongo (Bab 1 - 50)</p>
        </header>
        <div class="chapter-grid" id="menu"></div>
    </div>

    <script>
        const menu = document.getElementById('menu');
        for (let i = 1; i <= 50; i++) {
            const a = document.createElement('a');
            a.href = `template.html?bab=${i}`;
            a.className = 'chapter-card';
            a.innerHTML = `
                <div style="color:var(--accent); font-size:1.6rem; font-weight:900;">${i}</div>
                <div style="font-size:0.75rem; color:var(--text-dim); text-transform:uppercase;">第${i}課</div>
            `;
            menu.appendChild(a);
        }
    </script>
</body>
</html>
