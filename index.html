<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nihongo Pro - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Nihongo Pro</h1>
        <p>Minna no Nihongo (1 - 51)</p>
    </header>

    <div id="bab-list"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('bab-list');
            for (let i = 1; i <= 51; i++) {
                const card = document.createElement('a');
                card.href = `template.html?bab=${i}`;
                card.className = i === 51 ? 'bab-card special' : 'bab-card';
                card.innerHTML = `<span class="number">${i}</span><span class="label">第${i}課</span>`;
                container.appendChild(card);
            }
        });
    </script>
</body>
</html>
