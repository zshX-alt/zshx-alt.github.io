<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Kanji</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="template.html?bab=" id="back-link">← Kembali ke Materi</a>
    <h1 id="title">Daftar Kanji</h1>
    <div id="kanji-content"></div>

    <script type="module">
        import { kanjiMaster } from './data/kanjiData.js';
        const params = new URLSearchParams(window.location.search);
        const babId = params.get('bab');
        
        document.getElementById('back-link').href = `template.html?bab=${babId}`;
        
        const list = kanjiMaster[`bab${babId}`];
        const container = document.getElementById('kanji-content');
        
        if (list) {
            container.innerHTML = list.map(k => `
                <div class="card">
                    <h2 style="font-size: 3rem;">${k.char}</h2>
                    <p><strong>On-yomi:</strong> ${k.on}</p>
                    <p><strong>Kun-yomi:</strong> ${k.kun}</p>
                    <p><strong>Arti:</strong> ${k.arti}</p>
                </div>
            `).join('');
        } else {
            container.innerHTML = "<p>Data Kanji belum diisi buat bab ini.</p>";
        }
    </script>
</body>
</html>
